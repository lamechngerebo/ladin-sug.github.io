<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUG Executive Dashboard | RSCHSMT</title>
    <!-- Google Fonts for professional typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --accent: #eab308;
            --text-main: #f8fafc;
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0; min-height: 100vh;
        }

        /* --- Branding Section --- */
        .header-brand { text-align: center; padding: 40px 20px; animation: fadeIn 1s ease-out; }
        .logo-group { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .logo-group img { height: 90px; filter: drop-shadow(0 0 10px rgba(234, 179, 8, 0.2)); }
        .school-name { font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; margin: 10px 0; color: var(--accent); }

        /* --- Login Module --- */
        #login-view { position: fixed; inset: 0; background: var(--bg-color); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: var(--card-bg); backdrop-filter: blur(20px); padding: 40px; border-radius: 24px; border: var(--glass-border); text-align: center; }

        /* --- Dashboard Grid --- */
        #dashboard-view { display: none; max-width: 1200px; margin: 0 auto; padding: 0 20px 50px; opacity: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        
        .card { 
            background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 20px; 
            border: var(--glass-border); overflow: hidden; cursor: pointer; animation: slideUp 0.5s ease;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-10px); box-shadow: 0 20px 30px rgba(0,0,0,0.3); }
        .card img { width: 100%; height: 260px; object-fit: cover; }
        .info { padding: 20px; }

        /* --- Utility --- */
        input { background: rgba(255,255,255,0.05); border: var(--glass-border); padding: 15px 25px; border-radius: 50px; color: white; width: 100%; max-width: 400px; outline: none; }
        button { background: var(--accent); color: #000; padding: 12px 30px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <!-- Authentication Layer -->
    <div id="login-view">
        <div class="login-box">
            <h2 style="margin-bottom:20px;">Portal Login</h2>
            <input type="password" id="pass-input" placeholder="Enter Access PIN">
            <br><br><button onclick="Auth.attempt()">Enter System</button>
        </div>
    </div>

    <!-- Main Application View -->
    <div id="dashboard-view">
        <div class="header-brand">
            <div class="logo-group">
                <img src="aluta_logo.png" alt="Aluta" onerror="this.style.display='none'">
                <img src="college_logo.png" alt="College" onerror="this.style.display='none'">
            </div>
            <div class="school-name">Rivers State College of Health Science and Management Technology</div>
            <h1>Executive Directory</h1>
            <input type="text" id="search-box" placeholder="Search by name or role..." onkeyup="Directory.filter()">
        </div>
        <div class="grid" id="directory-container"></div>
    </div>

    <script>
        // Data Configuration (Separate from logic for professional maintenance)
        const EXEC_DATA = [
            { r: "SUG President", n: "Sen. Comr. Justina Gentle Welli", img: "president.jpg" }, 
            { r: "SUG Speaker", n: "Rt. Hon. Godspower Awajimowa Ebirien", img: "speaker.jpg" }, 
            { r: "SUG Secretary", n: "Comr. Favour Mbete", img: "secretary.jpg" }, 
            { r: "SUG Provost", n: "Comr. Ngerebo Lamech Dimkpa", img: "file_0000000021e4724391c24cccd4c8aa8a.png" },
            { r: "SUG Financial Secretary", n: "Comr. Chinemerem Silver", img: "WA_1781601350244.jpeg" },
            { r: "Internal Auditor", n: "Victor Dakubor", img: "IMG-20260607-WA0068.jpg" },
            { r: "SUG Deputy Speaker", n: "Hon. PraiseGod Barisi", img: "IMG-20260415-WA0270(1).jpg" },
            { r: "Director of Sports", n: "Comr. Nelson", img: "IMG-20260616-WA0072.jpg" },
            { r: "Director Of Socials", n: "Comr. Queeneth Amadi", img: "WA_1781559411308.jpeg" },
            { r: "SUG P.R.O", n: "Comr. Bob Orji", img: "1781559973250.jpg" }
        ];

        // Advanced Auth Controller
        const Auth = {
            attempt: () => {
                const pass = document.getElementById('pass-input').value;
                if(pass === "1234") {
                    localStorage.setItem('session_active', 'true');
                    document.getElementById('login-view').style.display = 'none';
                    document.getElementById('dashboard-view').style.display = 'block';
                    setTimeout(() => document.getElementById('dashboard-view').style.opacity = '1', 100);
                    Directory.render(EXEC_DATA);
                } else { alert("Access Denied"); }
            }
        };

        // Advanced Directory Controller
        const Directory = {
            render: (data) => {
                const container = document.getElementById('directory-container');
                container.innerHTML = '';
                data.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${p.img}" alt="${p.n}" onerror="this.src='https://via.placeholder.com/300?text=No+Photo'">
                        <div class="info">
                            <div style="color:var(--accent); font-size: 0.7rem; text-transform:uppercase;">${p.r}</div>
                            <h3 style="margin:5px 0;">${p.n}</h3>
                        </div>
                    `;
                    container.appendChild(card);
                });
            },
            filter: () => {
                const query = document.getElementById('search-box').value.toLowerCase();
                const filtered = EXEC_DATA.filter(p => 
                    p.n.toLowerCase().includes(query) || p.r.toLowerCase().includes(query)
                );
                Directory.render(filtered);
            }
        };

        // Initialize Session Check
        if(localStorage.getItem('session_active') === 'true') {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('dashboard-view').style.opacity = '1';
            Directory.render(EXEC_DATA);
        }
    </script>
</body>
    </html>
