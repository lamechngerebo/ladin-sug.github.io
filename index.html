<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official SUG Portal | RIVCOHSMAT</title>
    <style>
        /* Matured Royal Blue & Crisp White Theme */
        :root {
            --primary-blue: #0A369D;
            --accent-blue: #4A90E2;
            --dark-blue: #051C52;
            --pure-white: #FFFFFF;
            --bg-light: #F4F7FC;
            --text-main: #2C3E50;
            --text-muted: #7F8C8D;
            --success-green: #2ECC71;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Top Navigation Bar */
        nav {
            background-color: var(--primary-blue);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo-text {
            color: var(--pure-white);
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links button {
            background: none;
            border: none;
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .nav-links button:hover, .nav-links button.active {
            color: var(--pure-white);
            background-color: var(--accent-blue);
        }

        /* Header / Banner Area */
        header {
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
            color: var(--pure-white);
            text-align: center;
            padding: 50px 20px;
            border-bottom: 4px solid var(--accent-blue);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .logo-box {
            background: var(--pure-white);
            padding: 10px;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .logo-box svg {
            width: 50px;
            height: 50px;
        }

        header h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        header h2 {
            font-size: 1.5rem;
            color: var(--accent-blue);
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Dynamic Page Section Styling */
        .page {
            display: none;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            animation: fadeIn 0.5s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HOME PAGE: Matured Long Content Layout */
        .content-card {
            background: var(--pure-white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .content-card h3 {
            color: var(--primary-blue);
            font-size: 1.8rem;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg-light);
            padding-bottom: 10px;
        }

        .content-card p {
            margin-bottom: 20px;
            font-size: 1.1rem;
            text-align: justify;
        }

        /* EXECUTIVES PAGE: Interactive Grid Layout */
        .exec-split {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .exec-split { grid-template-columns: 1fr; }
        }

        .exec-list-panel {
            background: var(--pure-white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-height: 650px;
            overflow-y: auto;
        }

        .exec-item {
            padding: 12px 15px;
            border-bottom: 1px solid var(--bg-light);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .exec-item:hover, .exec-item.selected {
            background-color: var(--primary-blue);
            color: var(--pure-white);
        }

        .exec-item span {
            display: block;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .exec-viewer-panel {
            background: var(--pure-white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 450px;
        }

        .photo-frame {
            width: 260px;
            height: 260px;
            border-radius: 12px;
            background-color: var(--bg-light);
            border: 4px solid var(--primary-blue);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .viewer-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 5px;
        }

        .viewer-role {
            font-size: 1.1rem;
            color: var(--accent-blue);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }

        .viewer-admin-tag {
            background: var(--bg-light);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-main);
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* REGISTRATION & PROFILE PAGE Layout */
        .form-box {
            max-width: 600px;
            margin: 0 auto;
            background: var(--pure-white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark-blue);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #E1E8E4;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-blue);
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary-blue);
            color: var(--pure-white);
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-submit:hover {
            background-color: var(--dark-blue);
        }

        /* Split Directory Dashboard Layout */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .dashboard-layout { grid-template-columns: 1fr; }
        }

        .profile-container {
            background: var(--pure-white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        .user-avatar-upload {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--bg-light);
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px dashed var(--accent-blue);
            position: relative;
            cursor: pointer;
        }

        .user-avatar-upload img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-overlay {
            position: absolute;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 0.75rem;
            bottom: 0;
            width: 100%;
            padding: 4px 0;
        }

            padding: 30px;
            border-radius: 12px;
