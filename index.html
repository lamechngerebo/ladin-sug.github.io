<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSCHSMT | Official SUG Portal</title>
    <style>
        :root {
            --primary: #0f172a; --secondary: #1e293b; --accent: #eab308;
            --text: #f8fafc; --glass: rgba(30, 41, 59, 0.7);
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #020617; color: var(--text); margin: 0; display: flex; min-height: 100vh; }

        /* --- Global Layout --- */
        #nav-sidebar { width: 250px; background: var(--secondary); padding: 20px; border-right: 1px solid #334155; position: fixed; height: 100%; }
        #app-viewport { margin-left: 250px; padding: 40px; width: calc(100% - 250px); }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- UI Components --- */
        .card { background: var(--glass); border: 1px solid #334155; padding: 25px; border-radius: 15px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #0f172a; border: 1px solid #444; color: white; }
        button { background: var(--accent); color: black; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; }
        
        .exec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .exec-card { cursor: pointer; text-align: center; background: var(--secondary); padding: 15px; border-radius: 10px; }
        .exec-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

<aside id="nav-sidebar">
    <h2>SUG PORTAL</h2>
    <nav>
        <div class="nav-item" onclick="Portal.render('home')">Home</div>
        <div class="nav-item" onclick="Portal.render('execs')">Executives</div>
        <div class="nav-item" onclick="Portal.render('register')">Register</div>
        <div class="nav-item" onclick="Portal.render('dashboard')">Member Dashboard</div>
        <div class="nav-item" onclick="Portal.render('admin')">Admin Controls</div>
    </nav>
</aside>

<main id="app-viewport">
    <!-- PAGES ARE INJECTED HERE VIA JS -->
    <div id="page-content"></div>
</main>

<script>
    const Portal = {
        // Core Data
        execs: [
            { name: "Sen. Comr. Justina Gentle Welli", role: "SUG President", img: "president.jpg" },
            { name: "Comr. Ngerebo Lamech Dimkpa", role: "SUG Provost", img: "provost.jpg" },
            // ... add your full array here
        ],

        // Page Router
        render: (pageId) => {
            const content = document.getElementById('page-content');
            content.innerHTML = ""; // Clear current
            
            if(pageId === 'home') content.innerHTML = `
                <h1>Rivers State College of Health Science & Management Tech</h1>
                <h3>2025/2026 Administration</h3>
                <div class="card">
                    <h2>About the SUG</h2>
                    <p>The Student Union Government is the apex body...</p>
                </div>
            `;
            
            if(pageId === 'execs') {
                content.innerHTML = `<h1>Executive Council</h1><div class="exec-grid" id="grid"></div>`;
                const grid = document.getElementById('grid');
                this.execs.forEach(e => {
                    grid.innerHTML += `<div class="exec-card" onclick="alert('${e.name}')">
                        <img src="${e.img}"><h4>${e.role}</h4><p>${e.name}</p>
                    </div>`;
                });
            }
            
            if(pageId === 'register') {
                content.innerHTML = `
                    <h2>Register</h2>
                    <input type="text" id="name" placeholder="Full Name">
                    <input type="text" id="matric" placeholder="Matric Number">
                    <button onclick="Portal.authRegister()">Register</button>
                `;
            }
        },

        authRegister: () => {
            const m = document.getElementById('matric').value;
            if(localStorage.getItem(m)) return alert("Matric number already registered.");
            localStorage.setItem(m, JSON.stringify({ name: document.getElementById('name').value }));
            alert("Registration successful.");
        }
    };

    // Initial Load
    Portal.render('home');
</script>
</body>
</html>
