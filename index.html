<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUG Portal - Digital Gateway</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #16a085;
            --danger: #e74c3c;
            --light: #ecf0f1;
            --dark: #2c3e50;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: var(--dark);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, var(--primary), #34495e);
            color: var(--white);
            padding: 25px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            position: relative;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        header p {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .auth-status-bar {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            border-radius: 30px;
            font-size: 0.85rem;
        }

        .auth-btn {
            background: var(--accent);
            color: var(--white);
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        .auth-btn:hover {
            background: #12876f;
        }

        .logout-btn {
            background: var(--danger);
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        main {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            position: relative;
            padding-bottom: 8px;
            color: var(--primary);
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* Executive Grid Styles */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 5px;
        }

        .exec-card {
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .exec-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .exec-photo {
            width: 100%;
            height: 260px;
            object-fit: cover;
            background-color: #eaeaea;
        }

        .exec-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .exec-role {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 5px;
        }

        .exec-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .exec-bio {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .exec-contact {
            font-size: 0.85rem;
            color: #7f8c8d;
            border-top: 1px solid #f0f0f0;
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
                /* Stream/Social Section */
        .social-section {
            margin-top: 50px;
            background: #eaeded;
            padding: 30px 20px;
            border-radius: var(--radius);
        }

        .admin-controls-box {
            background: var(--white);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        .admin-controls-box h3 {
            margin-bottom: 15px;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced8e3;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
        }

        .submit-btn {
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            width: 100%;
        }

        .submit-btn:hover {
            background: #1a252f;
        }

        .stream-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 700px;
            margin: 0 auto;
        }

        .feed-card {
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
        }

        .feed-media {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            display: block;
            background: #000;
        }

        .feed-content {
            padding: 20px;
        }

        .feed-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .like-btn {
            background: #f8d7da;
            color: #721c24;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .comment-display-box {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .comment-bubble {
            background: #f1f2f6;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.88rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .del-comment-link {
            color: var(--danger);
            font-size: 0.75rem;
            cursor: pointer;
            margin-left: 10px;
            font-weight: bold;
        }

        .admin-del-post-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(231, 76, 60, 0.9);
            color: var(--white);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 5;
        }

        /* Authentication Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: var(--white);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 380px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #95a5a6;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.85rem;
            color: #7f8c8d;
            background: #fff;
            margin-top: 50px;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Student Union Government</h1>
        <p>Executive Directory & Campus Media Terminal</p>
        <div class="auth-status-bar">
            <span id="auth-status-text">Loading access profile...</span>
            <button id="auth-action-btn" class="auth-btn" onclick="handleAuthAction()">Login</button>
        </div>
    </header>
        <main>
        <!-- Executive Section -->
        <section style="margin-bottom: 40px;">
            <h2 class="section-title">Executive Cabinet Profiles</h2>
            <div id="exec-grid" class="grid-container">
                <!-- Profiles will load here dynamically via JavaScript -->
            </div>
        </section>

        <!-- Media Stream Feed Section -->
        <section class="social-section">
            <h2 class="section-title">Anonymous Campus Social Feed</h2>
            
            <!-- Protected Administrative Input Panel -->
            <div id="admin-post-panel" class="admin-controls-box" style="display: none;">
                <h3>🔒 Administrator Content Creator Panel</h3>
                <div class="form-group">
                    <label for="post-media-url">Media Asset Link (Image or Video URL)</label>
                    <input type="url" id="post-media-url" class="form-control" placeholder="https://unsplash.com... or video .mp4 link">
                </div>
                <div class="form-group">
                    <label for="post-caption">Announcement Memo Caption</label>
                    <textarea id="post-caption" class="form-control" rows="3" placeholder="Enter formal briefing text..."></textarea>
                </div>
                <div class="form-group" style="display:flex; gap:15px; align-items:center;">
                    <label style="margin:0; display:flex; align-items:center; gap:5px; cursor:pointer;">
                        <input type="checkbox" id="post-is-video"> Check this box if asset URL points to a Video (.mp4) file
                    </label>
                </div>
                <button class="submit-btn" onclick="submitAdminPost()">Broadcast Announcement</button>
            </div>

            <!-- Feed Stream Grid Mount -->
            <div id="media-posts-stream" class="stream-grid">
                <!-- Social media posts will mount here dynamically -->
            </div>
        </section>
    </main>

    <!-- Modal Login Frame -->
    <div id="login-modal" class="modal-overlay">
        <div class="modal-box">
            <button class="close-modal" onclick="toggleLoginModal(false)">&times;</button>
            <h3 style="margin-bottom:15px; font-size:1.3rem; color:var(--primary);">Sign In Securely</h3>
            <div class="form-group">
                <label for="login-username">Access Identifier</label>
                <input type="text" id="login-username" class="form-control" placeholder="Enter username (e.g. admin)">
            </div>
            <div class="form-group">
                <label for="login-password">Access Password Key</label>
                <input type="password" id="login-password" class="form-control" placeholder="Enter system security password">
            </div>
            <button class="submit-btn" style="background:var(--accent);" onclick="submitLoginProcess()">Authorize Connection</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Student Union Government Terminal. Verified Open Source Architecture Engine.</p>
    </footer>

    <script>
                                // Core Static Mock Data Framework Setup
        const defaultExecutives = [
            { role: "President", name: "Comrade Chidi Okechukwu", bio: "Driving educational equality, systemic campus overhauls, infrastructure developments, and student welfare validation schemes.", email: "president.sug@university.edu", phone: "+234 803 111 2222", photo: "https://unsplash.com" },
            { role: "Vice President", name: "Amina Yusuf Bello", bio: "Overseeing internal student affairs committees, structural union policy frameworks, and direct academic stakeholder negotiations.", email: "vp.sug@university.edu", phone: "+234 803 333 4444", photo: "https://unsplash.com" },
            { role: "Secretary General", name: "David Segun Kolawole", bio: "Managing official institutional records, tracking executive correspondence logs, and aligning micro-committee action timelines.", email: "secgen.sug@university.edu", phone: "+234 805 555 6666", photo: "https://unsplash.com" }
        ];

        const defaultPosts = [
            { id: 1718000000000, src: "https://unsplash.com", videoFlag: false, caption: "Official briefing on upcoming semester examinations and libraries operations timetable.", timestamp: "15/06/2026, 10:30 AM", likes: 24, likedUsers: [], comments: [{ authorId: "STU_102", msg: "Are libraries open overnight?" }, { authorId: "ADMIN", msg: "Yes, 24-hour schedules apply next week." }] },
            { id: 1718000000001, src: "https://unsplash.com", videoFlag: false, caption: "The New Innovation Hub lab terminal is officially launched for registration profiles tomorrow.", timestamp: "16/06/2026, 09:15 AM", likes: 42, likedUsers: [], comments: [] }
        ];

        // Self-Healing Storage Verification Routine
        if (!localStorage.getItem('SUG_SOCIAL_STREAM')) {
            localStorage.setItem('SUG_SOCIAL_STREAM', JSON.stringify(defaultPosts));
        }

        // Module Engine 1: Layout Render Logic
        function renderExecutiveGrid() {
            const grid = document.getElementById('exec-grid');
            if(!grid) return;
            grid.innerHTML = "";
            defaultExecutives.forEach(exec => {
                const card = document.createElement('div');
                card.className = 'exec-card';
                card.innerHTML = `
                    <img src="${exec.photo}" class="exec-photo" alt="${exec.name}">
                    <div class="exec-info">
                        <div class="exec-role">${exec.role}</div>
                        <div class="exec-name">${exec.name}</div>
                        <div class="exec-bio">${exec.bio}</div>
                        <div class="exec-contact">
                            <span>📧 ${exec.email}</span>
                            <span>📞 ${exec.phone}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            refreshAuthUIState();
        }
                // Module Engine 2: Security Validation System
        function refreshAuthUIState() {
            const session = localStorage.getItem('SUG_SESS');
            const statusText = document.getElementById('auth-status-text');
            const actionBtn = document.getElementById('auth-action-btn');
            const adminPanel = document.getElementById('admin-post-panel');

            if (session) {
                statusText.innerText = session === 'ADMIN' ? 'Authorized as SUG Administrator' : 'Connected as Anonymous Student';
                actionBtn.innerText = 'Logout';
                actionBtn.className = 'auth-btn logout-btn';
                adminPanel.style.display = session === 'ADMIN' ? 'block' : 'none';
            } else {
                statusText.innerText = 'Public Safe-Mode Viewer Mode';
                actionBtn.innerText = 'Sign In';
                actionBtn.className = 'auth-btn';
                adminPanel.style.display = 'none';
            }
            renderSocialFeed();
        }

        function handleAuthAction() {
            const session = localStorage.getItem('SUG_SESS');
            if (session) {
                localStorage.removeItem('SUG_SESS');
                refreshAuthUIState();
            } else {
                toggleLoginModal(true);
            }
        }

        function toggleLoginModal(open) {
            const modal = document.getElementById('login-modal');
            if(open) modal.classList.add('active');
            else modal.classList.remove('active');
        }

        function submitLoginProcess() {
            const u = document.getElementById('login-username').value.trim();
            const p = document.getElementById('login-password').value.trim();

            if (u.toLowerCase() === 'admin' && p === 'sug2026') {
                localStorage.setItem('SUG_SESS', 'ADMIN');
                cleanupLoginFieldsAndClose();
            } else if (u.length >= 3 && p === 'student') {
                localStorage.setItem('SUG_SESS', 'STU_' + Math.floor(100 + Math.random() * 900));
                cleanupLoginFieldsAndClose();
            } else {
                alert('Invalid credential match. Use admin/sug2026 or name/student.');
            }
        }

        function cleanupLoginFieldsAndClose() {
            document.getElementById('login-username').value = "";
            document.getElementById('login-password').value = "";
            toggleLoginModal(false);
            refreshAuthUIState();
        }

        // Module Engine 3: Broadcast Publisher Operations
        function submitAdminPost() {
            const urlInput = document.getElementById('post-media-url').value.trim();
            const captionInput = document.getElementById('post-caption').value.trim();
            const isVideoInput = document.getElementById('post-is-video').checked;

            if (!urlInput || !captionInput) {
                alert('Both the Media Link and Briefing Caption values must be populated.');
                return;
            }

            const posts = JSON.parse(localStorage.getItem('SUG_SOCIAL_STREAM') || '[]');
            const newPost = {
                id: Date.now(),
                src: urlInput,
                videoFlag: isVideoInput,
                caption: captionInput,
                timestamp: new Date().toLocaleString(),
                likes: 0,
                likedUsers: [],
                comments: []
            };

            posts.unshift(newPost);
            localStorage.setItem('SUG_SOCIAL_STREAM', JSON.stringify(posts));

            document.getElementById('post-media-url').value = "";
            document.getElementById('post-caption').value = "";
            document.getElementById('post-is-video').checked = false;

            renderSocialFeed();
        }
                // Module Engine 4: Interactive Media Feed Architecture
        function renderSocialFeed() {
            const streamContainer = document.getElementById('media-posts-stream'); 
            if(!streamContainer) return; 
            streamContainer.innerHTML = "";
            
            const s = localStorage.getItem('SUG_SESS'); 
            const posts = JSON.parse(localStorage.getItem('SUG_SOCIAL_STREAM') || '[]');
            
            if(posts.length === 0) { 
                streamContainer.innerHTML = '<p style="text-align:center; color:#7f8c8d; font-style:italic; padding:20px; background:#fff; border-radius:12px; box-shadow:var(--shadow);">No announcement posts available yet.</p>'; 
                return; 
            }
            
            posts.forEach(post => {
                let mediaTag = post.videoFlag ? `<video src="${post.src}" class="feed-media" controls></video>` : `<img src="${post.src}" class="feed-media" alt="Post">`;
                const card = document.createElement('div'); 
                card.className = 'feed-card';
                
                card.innerHTML = `
                    ${mediaTag}
                    <div class="feed-content">
                        <p style="font-size:0.75rem; color:#7f8c8d; font-weight:bold; margin-bottom:5px;">📢 Posted: ${post.timestamp}</p>
                        <p style="font-size:1.05rem; margin-bottom:15px; color:var(--dark); font-weight:600;">${post.caption}</p>
                        <div class="feed-actions">
                            <button class="like-btn" id="like-btn-${post.id}">❤️ <span>${post.likes}</span> Likes</button>
                        </div>
                        <div class="comment-display-box" id="comments-box-${post.id}"></div>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="comment-input-${post.id}" placeholder="Write a comment anonymously..." style="flex-grow:1; padding:8px; border:1px solid #ced8e3; border-radius:6px; font-size:0.9rem;">
                            <button id="post-comment-btn-${post.id}" style="background:var(--primary); color:var(--white); border:none; padding:8px 15px; border-radius:6px; font-weight:bold; font-size:0.85rem; cursor:pointer;">Post</button>
                        </div>
                    </div>
                `;
                
                streamContainer.appendChild(card);

                if (s === 'ADMIN') {
                    const adminDelBtn = document.createElement('button'); 
                    adminDelBtn.className = 'admin-del-post-btn'; 
                    adminDelBtn.innerText = 'Delete Post';
                    adminDelBtn.onclick = () => deleteAdminPost(post.id); 
                    card.appendChild(adminDelBtn);
                }

                card.querySelector('#like-btn-' + post.id).onclick = () => togglePostLike(post.id);
                card.querySelector('#post-comment-btn-' + post.id).onclick = () => submitPostComment(post.id);
                
                const cBox = card.querySelector('#comments-box-' + post.id);
                if(post.comments && Array.isArray(post.comments)) {
                    post.comments.forEach((c, idx) => {
                        const cBubble = document.createElement('div'); 
                        cBubble.className = 'comment-bubble';
                        let visualAuthor = "Anonymous Student";
                        if(c && c.authorId === 'ADMIN') { visualAuthor = "SUG Admin"; }
                        
                        cBubble.innerHTML = `<div><strong>${visualAuthor}:</strong> ${c && c.msg ? c.msg : ""}</div>`;
                        
                        if (c && (c.authorId === s || s === 'ADMIN')) {
                            const dBtn = document.createElement('span'); 
                            dBtn.className = 'del-comment-link'; 
                            dBtn.innerText = '[Delete]';
                            dBtn.onclick = () => deleteFeedComment(post.id, idx); 
                            cBubble.appendChild(dBtn);
                        }
                        cBox.appendChild(cBubble);
                    });
                }
            });
        }

        function deleteAdminPost(postId) {
            let posts = JSON.parse(localStorage.getItem('SUG_SOCIAL_STREAM') || '[]');
            posts = posts.filter(p => p.id !== postId);
            localStorage.setItem('SUG_SOCIAL_STREAM', JSON.stringify(posts));
            renderSocialFeed();
        }

        function togglePostLike(postId) {
            const s = localStorage.getItem('SUG_SESS'); 
            if(!s) { alert('Please login using any username to like posts or participate in comments.'); return; }
            let posts = JSON.parse(localStorage.getItem('SUG_SOCIAL_STREAM') || '[]'); 
            const post = posts.find(p => p.id === postId); 
            if(!post) return;
            
            if(!post.likedUsers) post.likedUsers = [];
            const uIdx = post.likedUsers.indexOf(s);
            if(uIdx === -1) { 
                post.likes++; 
                post.likedUsers.push(s); 
            } else { 
                post.likes--; 
                post.likedUsers.splice(uIdx, 1); 
            }
            localStorage.setItem('SUG_SOCIAL_STREAM', JSON.stringify(posts)); 
            renderSocialFeed();
        }

        function submitPostComment(postId) {
            const s = localStorage.getItem('SUG_SESS'); 
            if(!s) { alert('Please click Sign In to post public anonymous remarks.'); return; }
            const inputField = document.getElementById('comment-input-' + postId);
            const commentText = inputField.value.trim(); 
            if(!commentText) return;
            
            let posts = JSON.parse(localStorage.getItem('SUG_SOCIAL_STREAM') || '[]'); 
            const post = posts.find(p => p.id === postId); 
            if(!post) return;
            if(!post.comments) post.comments = [];
            
            post.comments.push({ authorId: s, msg: commentText }); 
            localStorage.setItem('SUG_SOCIAL_STREAM', JSON.stringify(posts)); 
            inputField.value = ""; 
            renderSocialFeed();
        }

        function deleteFeedComment(postId, commentIndex) {
            let posts = JSON.parse(localStorage.getItem('SUG_SOCIAL_STREAM') || '[]'); 
            const post = posts.find(p => p.id === postId); 
            if(!post) return;
            if(post.comments) post.comments.splice(commentIndex, 1); 
            localStorage.setItem('SUG_SOCIAL_STREAM', JSON.stringify(posts)); 
            renderSocialFeed();
        }

        // Initialize App on Window Load Event
        window.onload = renderExecutiveGrid;
    </script>
</body>
</html>
