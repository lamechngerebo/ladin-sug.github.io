<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Directory</title>
    <style>
        /* Mature Color Palette & Typography */
        :root {
            --bg-deep: #0f172a;      /* Deep Navy Background */
            --card-bg: #1e293b;      /* Slate Card Background */
            --text-main: #f8fafc;     /* White/Off-White */
            --text-dim: #94a3b8;      /* Grey for roles */
            --accent: #eab308;        /* Professional Gold Accent */
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-bottom: 50px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--accent);
            display: inline-block;
            margin-left: auto;
            margin-right: auto;
            display: block;
            width: fit-content;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
            border: 1px solid #334155;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        .info {
            padding: 20px;
        }

        .role {
            font-size: 0.85rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .name {
            font-size: 1.2rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Executive Council</h1>
        <div class="grid" id="directory"></div>
    </div>

    <script>
        const data = [
            { r: "SUG President", n: "Sen. Comr. Justina Gentle Welli", img: "president.jpg" }, 
            { r: "SUG Vice President", n: "Comr. Nwibu Roselyn", img: "" }, 
            { r: "SUG Speaker", n: "Rt. Hon. Godspower Awajimowa Ebirien", img: "speaker.jpg" }, 
            { r: "SUG Deputy Speaker", n: "Hon. PraiseGod Barisi", img: "IMG-20260415-WA0270(1).jpg" },
            { r: "SUG Secretary", n: "Comr. Favour Mbete", img: "secretary.jpg" }, 
            { r: "SUG Provost", n: "Comr. Ngerebo Lamech Dimkpa", img: "file_0000000021e4724391c24cccd4c8aa8a.png" },
            { r: "SUG Treasurer", n: "Comr. Vera", img: "" }, 
            { r: "SUG P.R.O", n: "Comr. Bob Orji", img: "" },
            { r: "SUG Financial Secretary", n: "Comr. Chinemerem Silver", img: "WA_1781601350244.jpeg" },
            { r: "SUG Welfare", n: "Comr. Maureen", img: "" },
            { r: "Director Of Socials", n: "Comr. Queeneth Amadi", img: "" }, 
            { r: "Director of Sports", n: "Comr. Nelson", img: "" },
            { r: "Chief Whip", n: "Chinna Success", img: "" }, 
            { r: "Internal Auditor", n: "Victor Dakubor", img: "IMG-20260607-WA0068.jpg" }, 
            { r: "Majority Leader", n: "Akpobari Barisua", img: "" }
        ];

        const container = document.getElementById('directory');

        data.forEach(person => {
            const card = document.createElement('div');
            card.className = 'card';
            // Use placeholder if image is missing
            const imageSrc = person.img ? person.img : 'placeholder.jpg'; 
            
            card.innerHTML = `
                <img src="${imageSrc}" alt="${person.n}" onerror="this.style.display='none'">
                <div class="info">
                    <div class="role">${person.r}</div>
                    <div class="name">${person.n}</div>
                </div>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
